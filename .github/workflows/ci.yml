name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint training-app
        run: cd training-app && pnpm lint
      - name: Lint practice-app
        run: cd practice-app && pnpm lint
      - name: Type check training-app
        run: cd training-app && pnpm exec tsc --noEmit
      - name: Type check practice-app
        run: cd practice-app && pnpm exec tsc --noEmit

  build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: cd practice-app && pnpm exec playwright install --with-deps chromium
      - name: Run E2E tests
        run: cd practice-app && pnpm exec playwright test --retries=2
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-e2e
          path: practice-app/playwright-report/
          retention-days: 14

  # Reference tests — the 59 curriculum "gold standard" specs.
  # These intentionally find bugs in the practice app (that's the lesson).
  # This job is NON-BLOCKING (continue-on-error: true) so failing tests don't
  # break CI; the artifact shows which bugs are exposed vs hidden.
  reference-tests:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: cd practice-app && pnpm exec playwright install --with-deps chromium
      - name: Run reference tests (curriculum specs)
        run: cd practice-app && pnpm exec playwright test --config playwright.config.reference.ts --retries=2
      - name: Upload reference test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-reference
          path: practice-app/playwright-report/
          retention-days: 14
