# Deploy docs-site to GitHub Pages via OIDC (actions/deploy-pages).
#
# Triggers on push to main when docs-site/ files change.
# Uses the same OIDC pattern as deploy-practice-app.yml to avoid
# conflicting Pages sources (gh-pages branch vs. Actions artifact).
#
# GitHub Pages checklist:
# ✅ base path matches repo name (/midnight-playwright-journey/)
# ✅ 404 redirect handled (public/404.html with SPA redirect script)
# ✅ OIDC permissions scoped (pages: write, id-token: write)
# ✅ Environment block wired to deployment URL
# ✅ CNAME stub not needed (no custom domain configured)

name: Deploy Docs Site

on:
  push:
    branches: [main]
    paths: ["docs-site/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Install dependencies
        run: cd docs-site && pnpm install --frozen-lockfile

      - name: Build
        run: cd docs-site && pnpm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
