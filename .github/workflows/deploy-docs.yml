# Deploy docs-site to GitHub Pages via gh-pages branch.
#
# Triggers on push to main when docs-site/ files change.
# Uses peaceiris/actions-gh-pages@v3 to publish dist/ to the gh-pages branch.
#
# GitHub Pages checklist:
# ✅ base path matches repo name (/midnight-automation-voyage/)
# ✅ 404 redirect handled (public/404.html with SPA redirect script)
# ✅ gh-pages branch target set in workflow (publish_branch: gh-pages)
# ✅ GITHUB_TOKEN permissions scoped (contents: write)
# ✅ CNAME stub not needed (no custom domain configured)

name: Deploy Docs Site

on:
  push:
    branches: [main]
    paths: ["docs-site/**"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd docs-site && npm ci

      - name: Build
        run: cd docs-site && npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs-site/dist
          publish_branch: gh-pages
